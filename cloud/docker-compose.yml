services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./mosquitto_cloud.conf:/mosquitto/config/mosquitto.conf

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg15
    network_mode: host
    restart: unless-stopped
    environment:
      POSTGRES_DB: ttc_fleet
      POSTGRES_USER: ttc
      POSTGRES_PASSWORD: ttc_pass
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  cloud-logger:
    build:
      context: .
      dockerfile: logger/Dockerfile
      network: host
    network_mode: host
    restart: unless-stopped
    environment:
      MQTT_BROKER_HOST: localhost
      DB_HOST: localhost
      POSTGRES_DB: ttc_fleet
      POSTGRES_USER: ttc
      POSTGRES_PASSWORD: ttc_pass

  grafana:
    image: grafana/grafana:10.2.0
    network_mode: host
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DATABASES_POSTGRES_URL: postgres://ttc:ttc_pass@localhost:5432/ttc_fleet?sslmode=disable
    volumes:
      - ./grafana_dashboard.json:/var/lib/grafana/dashboards/bus-fleet.json
      - ./grafana_provisioning:/etc/grafana/provisioning

volumes:
  timescale_data:
